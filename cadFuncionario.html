<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" type="imagex/png" href="icone.ico">
    <link rel="stylesheet" href="stylecadFuncionario.css">
    <title>Cadastro | Funcionário</title>
</head>
<body>
    <div class="topnav">
        <a href="cadCliente.html">Cliente</a>
        <a href="cadFuncionario.html" id="navfuncionario" class="active">Funcionário</a>
        <a href="cadFornecedor.html" id="navfornecedor">Fornecedor</a>
        <a>Orçamento</a>
        <a>Sair</a>
    </div>
    <img src="imgcadFuncionario/imagem.png" class="mulher">
    <div class="caixa">
        <div class="container">
            <div class="titulo">
                <label class="cadastro">CADASTRO</label>
                <hr>
                <label class="funcionario">FUNCIONÁRIO</label>
            </div>
            <div class="primeironomeesobrenome">
                <input type="text" class="campo" id="primeironome" placeholder="Primeiro Nome" />
                <input type="text" class="campo" id="sobrenome" placeholder="Sobrenome" />
            </div>
            <input type="text" class="campo" id="datadenascimento" placeholder="Data de Nacimento" onfocus="(this.type='date')" onblur="(this.type='text')"/>
            <input type="text" class="campo" id="cargo" placeholder="Cargo" />
            <input type="number" class="campo" id="salario" placeholder="Salário" />
            <input type="text" class="campo" id="datadeadmissao" placeholder="Data de Admissão"  onfocus="(this.type='date')" onblur="(this.type='text')"/>
            <input type="text" class="campo" id="senha" placeholder="Senha" />
            <br />

            <div class="botoes">
                <input type="button" class="botao" value="Cancelar" />
                <input type="button" class="botao" value="Cadastrar" />
            </div>
        </div>
    </div>
    <div class="footer">
        <p>Feito por: Gustavo Felix Ferreira da Silva & Nayara Aparecida Silva Fioraneli — 2MD2</p>
    </div>
    <img src="imgcadFuncionario/logo.png" class="logo" />
</body>

</html>
